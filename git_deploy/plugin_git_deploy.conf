# The Displayname.
name=Git Deploy

# The application's service.
service=admin_panel,user_panel

# Physical path: /usr/local/lsws/Example/html/mypanel/3rdparty/index.php
# Literal URL path: $server:$port/3rdparty/plugin_folder/name/index.php
url=/module/git_deploy/gui/

# System user and group to run process as
user=nobody
group=nogroup

# Features required
features=advance

# Media required
icon=/media/icon/git_deploy.svg

#short
sorder=2
